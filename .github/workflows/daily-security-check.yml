---
name: Daily security check
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      # PHP checks
      - name: Check for php composer project
        id: check_composer
        uses: andstor/file-existence-action@v3
        with:
          files: "composer.lock"
      - name: Run php local security checker
        if: steps.check_composer.outputs.files_exists == 'true'
        uses: symfonycorp/security-checker-action@v5
        continue-on-error: true

      # node-yarn checks
      - name: Check for node-yarn project
        id: check_node_yarn
        uses: andstor/file-existence-action@v3
        with:
          files: "yarn.lock"
      - name: Setup node
        if: steps.check_node_yarn.outputs.files_exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Yarn Audit
        if: steps.check_node_yarn.outputs.files_exists == 'true'
        run: yarn audit --level high --groups dependencies optionalDependencies
        continue-on-error: true

      # node-npm checks
      - name: Check for node-npm project
        id: check_node_npm
        uses: andstor/file-existence-action@v3
        with:
          files: "package.lock"
      - name: Setup node
        if: steps.check_node_npm.outputs.files_exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: npm audit
        if: steps.check_node_npm.outputs.files_exists == 'true'
        run: npm audit --audit-level=high
        continue-on-error: true
